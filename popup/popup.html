<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deTime</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-left">
        <span class="header-icon">⏱️</span>
        <span class="header-title">deTime</span>
      </div>
      <div class="header-right">
        <button id="limitsBtn" class="header-btn" title="Usage Limits">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button id="dashboardBtn" class="header-btn" title="Open Dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main View -->
    <div id="mainView" class="view">
      <!-- Today Stats Card -->
      <section class="stats-card">
        <div class="stats-header">
          <span class="stats-label">Today</span>
          <span class="stats-date" id="todayDate"></span>
        </div>
        <div class="stats-content">
          <div class="time-ring-container">
            <canvas id="timeRingCanvas" width="120" height="120"></canvas>
            <div class="time-ring-center">
              <span class="time-value" id="totalTime">0h 0m</span>
              <span class="time-sublabel">total</span>
            </div>
          </div>
          <div class="stats-comparison" id="comparison">
            <span class="comparison-icon"></span>
            <span class="comparison-text">Start of tracking</span>
          </div>
        </div>
      </section>

      <!-- Current Site -->
      <section class="current-site-card" id="currentSiteCard">
        <div class="current-site-header">
          <img class="current-site-favicon" id="currentSiteFavicon" src="" alt="">
          <div class="current-site-info">
            <div class="current-site-domain" id="currentSiteDomain">Loading...</div>
            <div class="current-site-category" id="currentSiteCategory"></div>
          </div>
          <div class="current-site-time" id="currentSiteTime">--</div>
        </div>
        <div class="current-site-progress">
          <div class="current-site-progress-fill" id="currentSiteProgress"></div>
        </div>
        <div class="current-site-label">Time on this site today</div>
      </section>

      <!-- Categories -->
      <section class="categories-card">
        <div class="card-header">
          <h2>Categories</h2>
        </div>
        <div class="categories-list" id="categoriesList">
          <!-- Categories will be populated here -->
        </div>
      </section>

      <!-- Top Sites -->
      <section class="sites-card">
        <div class="card-header">
          <h2>Top Sites</h2>
        </div>
        <div class="sites-list" id="mostUsedList">
          <!-- Most used sites will be populated here -->
        </div>
        <button id="showMoreSitesBtn" class="show-more-btn hidden">Show More</button>
      </section>

      <!-- Focus Mode Card -->
      <section class="focus-card" id="focusModeCard">
        <div class="focus-header">
          <div class="focus-icon-wrap">
            <span class="focus-icon">🍅</span>
          </div>
          <div class="focus-info">
            <div class="focus-title">Focus Mode</div>
            <div class="focus-subtitle" id="focusStatus">Stay focused, block distractions</div>
          </div>
          <button id="focusToggleBtn" class="focus-toggle-btn">Start</button>
        </div>
        <div id="focusActiveSection" class="focus-active-section hidden">
          <div class="focus-timer" id="focusTimer">25:00</div>
          <div class="focus-progress">
            <div class="focus-progress-fill" id="focusProgressFill"></div>
          </div>
          <button id="stopFocusBtn" class="focus-stop-btn">End Session</button>
        </div>
        <div id="focusSettingsSection" class="focus-settings-section hidden">
          <div class="focus-duration-select">
            <label>Duration:</label>
            <select id="focusDuration" class="focus-select">
              <option value="15">15 min</option>
              <option value="25" selected>25 min</option>
              <option value="45">45 min</option>
              <option value="60">1 hour</option>
              <option value="90">1.5 hours</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <footer class="popup-footer">
        <button id="viewDetailsBtn" class="footer-btn">
          <span>View Full Dashboard</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </footer>
    </div>

    <!-- Limits View -->
    <div id="limitsView" class="view hidden">
      <section class="limits-header-section">
        <button id="backToMainBtn" class="back-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          <span>Back</span>
        </button>
        <h2>Usage Limits</h2>
      </section>

      <!-- Active Limits -->
      <section class="limits-card">
        <div class="card-header">
          <h2>Active Limits</h2>
          <span class="limits-count" id="limitsCount">0</span>
        </div>
        <div class="limits-list" id="currentLimitsList">
          <!-- Current limits will be populated here -->
        </div>
      </section>

      <!-- Add New Limit -->
      <section class="add-limit-card">
        <div class="card-header">
          <h2>Add New Limit</h2>
        </div>

        <div class="category-selection" id="categorySelectionList">
          <!-- Categories with expandable domains -->
        </div>

        <!-- Time Input Section -->
        <div id="timeInputSection" class="time-input-section hidden">
          <div class="selected-info" id="selectedTarget"></div>
          <div class="time-inputs">
            <div class="time-input-group">
              <input type="number" id="limitHours" class="time-input" min="0" max="23" value="1">
              <span class="time-unit">hours</span>
            </div>
            <div class="time-input-group">
              <input type="number" id="limitMinutes" class="time-input" min="0" max="59" value="0">
              <span class="time-unit">min</span>
            </div>
          </div>
          <button id="addLimitBtn" class="add-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Limit
          </button>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
